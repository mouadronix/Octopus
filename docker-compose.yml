services:
  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /src/backend/Octopus.Api
    command: dotnet run --urls http://0.0.0.0:5000
    ports:
      - "5000:5000"
    volumes:
      - ./:/src
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  ui:
    image: node:20
    working_dir: /src/frontend/octopus-ui
    command: sh -c "npm install && npm start -- --host 0.0.0.0"
    ports:
      - "4200:4200"
    volumes:
      - ./:/src
    depends_on:
      - api
